<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>port-town-demo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell">
      <header class="status-bar">
        <div class="status-item">Day: <span id="day">1</span></div>
        <div class="status-item">Stamina: <span id="stamina">12/12</span></div>
        <div class="status-item">Money: <span id="money">0</span></div>
      </header>

      <section class="scene-card">
        <div id="scene-image" class="scene-image" aria-label="scene image"></div>
        <h1 id="scene-title" class="scene-title">Harbor Town</h1>
      </section>

      <section class="text-card">
        <p id="text-content"></p>
      </section>

      <section id="choice-list" class="choice-list"></section>

      <section class="actions">
        <button id="continue-btn" type="button">Continue</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
